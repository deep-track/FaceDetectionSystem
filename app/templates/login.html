{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Login</h1>

  <input
    id="email"
    type="email"
    placeholder="Email"
    class="w-full mb-3 px-3 py-2 border rounded"
    required
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    class="w-full mb-4 px-3 py-2 border rounded"
    required
  />

  <button
    id="loginBtn"
    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700"
  >
    Sign In
  </button>

  <p id="error" class="text-red-600 mt-3"></p>

  <p class="mt-4 text-center">
    Don't have an account? <a href="/signup" class="text-blue-600 hover:underline">Sign Up</a>
  </p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
(function() {
  console.log("Script loaded");
  
  // Initialize Supabase
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "{{ SUPABASE_URL }}",
    "{{ SUPABASE_ANON_KEY }}"
  );

  console.log("Supabase initialized");

  // Add event listener
  document.getElementById("loginBtn").addEventListener("click", async function() {
    console.log("Login button clicked");
    
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorElement = document.getElementById("error");

    // Clear previous errors
    errorElement.innerText = "";

    // Validate inputs
    if (!email) {
      errorElement.innerText = "Please enter your email";
      return;
    }

    if (!password) {
      errorElement.innerText = "Please enter your password";
      return;
    }

    if (password.length < 6) {
      errorElement.innerText = "Password must be at least 6 characters";
      return;
    }

    console.log("Email:", email);
    console.log("Password length:", password.length);

    try {
      const { error, data } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      console.log("Full response:", { error, data });

      if (error) {
        console.error("Supabase error:", error);
        errorElement.innerText = error.message || "Login failed";
        return;
      }

      if (data && data.session) {
        console.log("Login successful!");
        localStorage.setItem("sb_token", data.session.access_token);
        window.location.href = "/";
      } else {
        errorElement.innerText = "Login failed - no session created";
      }
    } catch (err) {
      console.error("Caught error:", err);
      errorElement.innerText = "An error occurred: " + err.message;
    }
  });
})();
</script>

{% endblock %}
