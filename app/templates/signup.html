{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Sign Up</h1>

  <input
    id="email"
    type="email"
    placeholder="Email"
    class="w-full mb-3 px-3 py-2 border rounded"
    required
  />

  <input
    id="password"
    type="password"
    placeholder="Password (min 6 characters)"
    class="w-full mb-4 px-3 py-2 border rounded"
    required
  />

  <button
    id="signupBtn"
    class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700"
  >
    Sign Up
  </button>

  <p id="error" class="text-red-600 mt-3"></p>
  <p id="success" class="text-green-600 mt-3"></p>

  <p class="mt-4 text-center">
    Already have an account? <a href="/login" class="text-blue-600 hover:underline">Login</a>
  </p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
(function() {
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "{{ SUPABASE_URL }}",
    "{{ SUPABASE_ANON_KEY }}"
  );

  document.getElementById("signupBtn").addEventListener("click", async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorElement = document.getElementById("error");
    const successElement = document.getElementById("success");

    errorElement.innerText = "";
    successElement.innerText = "";

    if (!email) {
      errorElement.innerText = "Please enter your email";
      return;
    }

    if (!password || password.length < 6) {
      errorElement.innerText = "Password must be at least 6 characters";
      return;
    }

    console.log("Signing up with email:", email);

    try {
      const { error, data } = await supabaseClient.auth.signUp({
        email: email,
        password: password
      });

      console.log("Signup response:", { error, data });

      if (error) {
        console.error("Signup error:", error);
        errorElement.innerText = error.message;
        return;
      }

      if (data.user) {
        if (data.user.confirmed_at) {
          successElement.innerText = "Account created! Redirecting to login...";
          setTimeout(() => {
            window.location.href = "/login";
          }, 2000);
        } else {
          successElement.innerText = "Account created! Please check your email to confirm your account before logging in.";
        }
      }
    } catch (err) {
      console.error("Caught error:", err);
      errorElement.innerText = "An error occurred: " + err.message;
    }
  });
})();
</script>

{% endblock %}
