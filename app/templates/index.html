{% extends "base.html" %}
{% block content %}

<div class="bg-white p-6 rounded shadow">
  <h1 class="text-xl font-bold mb-4">Start a Recording</h1>

  <p class="mb-4 text-gray-600">
    Ensure your webcam is ready. Recording lasts 45 seconds.
  </p>

  <div class="space-x-4">
    <button
      onclick="startRecording('real')"
      class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"
    >
      Start REAL
    </button>

    <button
      onclick="startRecording('fake')"
      class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700"
    >
      Start FAKE
    </button>
  </div>

  <p id="status" class="mt-4 font-semibold"></p>
</div>

<script>
async function startRecording(label) {
  const token = localStorage.getItem("sb_token");
  if (!token) {
    window.location.href = "/login";
    return;
  }

  document.getElementById("status").innerText =
    "Recording in progress...";

  const res = await fetch("/recordings/start", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ label })
  });

  if (!res.ok) {
    document.getElementById("status").innerText =
      "Authentication failed. Please log in again.";
    return;
  }

  const data = await res.json();
  document.getElementById("status").innerText =
    data.message + " (Session " + data.session_id + ")";
}
</script>

{% endblock %}
